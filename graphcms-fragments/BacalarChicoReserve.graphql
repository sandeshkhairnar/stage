fragment BacalarChicoReserve on BacalarChicoReserve {
  stage
  publishedAt
  updatedAt
  createdAt
  remoteId: id
  pageTitle
  pageCont {
    ... on RichText {
      raw
      html
      markdown
      text
    }
  }
  headerImage {
    ... on GalleryImage {
      stage
      id
      imageAltText
      imageTitle
      image {
        ... on Asset {
          remoteTypeName: __typename
          remoteId: id
          locale
          stage
        }
      }
      updatedAt
    }
  }
  publishedBy {
    ... on User {
      remoteTypeName: __typename
      remoteId: id
      stage
    }
  }
  updatedBy {
    ... on User {
      remoteTypeName: __typename
      remoteId: id
      stage
    }
  }
  createdBy {
    ... on User {
      remoteTypeName: __typename
      remoteId: id
      stage
    }
  }
  scheduledIn {
    ... on ScheduledOperation {
      remoteTypeName: __typename
      remoteId: id
      stage
    }
  }
}